<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3 Завдання в одному</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 20px;
}

/* ================= TABS ================= */

.tabs-buttons {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.tab-btn {
  padding: 10px 15px;
  cursor: pointer;
  border: 1px solid #ccc;
  background: #f3f3f3;
}

.tab-btn.active {
  background: #007bff;
  color: white;
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}

/* ================= CALCULATOR ================= */

.calculator {
  width: 220px;
}

#display {
  width: 100%;
  height: 40px;
  margin-bottom: 10px;
  text-align: right;
  font-size: 18px;
  padding-right: 5px;
}

.calc-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
}

.calc-buttons button {
  padding: 15px;
  font-size: 16px;
  cursor: pointer;
}

/* ================= GALLERY ================= */

.gallery {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.gallery img {
  width: 120px;
  cursor: pointer;
  border-radius: 5px;
}

dialog img {
  max-width: 100%;
}

dialog::backdrop {
  background: rgba(0,0,0,0.5);
}

.close-btn {
  margin-top: 10px;
  padding: 5px 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Практична робота (3 завдання)</h1>

<!-- ================= TABS ================= -->

<div class="tabs">
  <div class="tabs-buttons">
    <button class="tab-btn active" data-tab="calc">Калькулятор</button>
    <button class="tab-btn" data-tab="tabs">Tabs</button>
    <button class="tab-btn" data-tab="gallery">Галерея</button>
  </div>

  <div class="tab-content active" id="calc">
    <h2>Базовий калькулятор</h2>

    <div class="calculator">
      <input type="text" id="display" readonly>

      <div class="calc-buttons">
        <button>7</button><button>8</button><button>9</button><button>/</button>
        <button>4</button><button>5</button><button>6</button><button>*</button>
        <button>1</button><button>2</button><button>3</button><button>-</button>
        <button>0</button><button>C</button><button>=</button><button>+</button>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tabs">
    <h2>Інтерактивні вкладки</h2>
    <p>Це контент другої вкладки.</p>
    <p>Перемикання зроблено через делегування подій.</p>
  </div>

  <div class="tab-content" id="gallery">
    <h2>Галерея</h2>

    <div class="gallery">
      <img src="https://picsum.photos/id/1015/300/200" alt="">
      <img src="https://picsum.photos/id/1025/300/200" alt="">
      <img src="https://picsum.photos/id/1035/300/200" alt="">
    </div>

    <dialog id="modal">
      <img id="modal-img" src="">
      <br>
      <button class="close-btn">Закрити</button>
    </dialog>

  </div>
</div>

<script>

/* ================= TABS ================= */

const tabsContainer = document.querySelector('.tabs-buttons');
const tabButtons = document.querySelectorAll('.tab-btn');
const tabContents = document.querySelectorAll('.tab-content');

tabsContainer.addEventListener('click', function(e) {
  if (!e.target.classList.contains('tab-btn')) return;

  tabButtons.forEach(btn => btn.classList.remove('active'));
  tabContents.forEach(content => content.classList.remove('active'));

  e.target.classList.add('active');
  document.getElementById(e.target.dataset.tab).classList.add('active');
});

/* ================= CALCULATOR ================= */

const display = document.getElementById('display');
const calcButtons = document.querySelector('.calc-buttons');

let currentInput = '';

calcButtons.addEventListener('click', function(e) {
  if (e.target.tagName !== 'BUTTON') return;

  const value = e.target.textContent;

  if (value === 'C') {
    currentInput = '';
    display.value = '';
    return;
  }

  if (value === '=') {
    try {
      if (currentInput.includes('/0')) {
        display.value = 'Error';
        currentInput = '';
        return;
      }

      currentInput = eval(currentInput).toString();
      display.value = currentInput;
    } catch {
      display.value = 'Error';
      currentInput = '';
    }
    return;
  }

  currentInput += value;
  display.value = currentInput;
});

/* ================= GALLERY ================= */

const gallery = document.querySelector('.gallery');
const modal = document.getElementById('modal');
const modalImg = document.getElementById('modal-img');
const closeBtn = document.querySelector('.close-btn');

gallery.addEventListener('click', function(e) {
  if (e.target.tagName !== 'IMG') return;

  modalImg.src = e.target.src;
  modal.showModal();
});

closeBtn.addEventListener('click', function() {
  modal.close();
});

modal.addEventListener('click', function(e) {
  if (e.target === modal) {
    modal.close();
  }
});

</script>

</body>
</html>
